<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Temperature Convertor</title>
    <link rel="stylesheet" href="temp-convertor.css" />
  </head>
  <body>
    <div class="container">
      <h1>Temperature Convertor</h1>
      <div class="temp-container">
        <label for="temp" class="input-label">Enter the number</label>
        <input type="number" id="temp" />
        <input type="radio" name="unit" id="cButton" />
        <label for="cButton">Celsius</label>
        <input type="radio" name="unit" id="fButton" />
        <label for="fButton">Fahrenheit</label>
        <button type="button" id="submitBtn">submit</button>
        <p id="display">Final Result Display here</p>
      </div>
    </div>

    <script src="temp-convertor.js"></script>
  </body>
</html>
